user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml
               application/x-javascript text/javascript application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Security headers map
    map $sent_http_content_type $referrer_policy {
        default "strict-origin-when-cross-origin";
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name uberfix.alazab.com www.uberfix.alazab.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://uberfix.alazab.com$request_uri;
        }
    }

    # www → non-www redirect
    server {
        listen 443 ssl;
        http2 on;
        server_name www.uberfix.alazab.com;

        ssl_certificate /etc/letsencrypt/live/uberfix.alazab.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/uberfix.alazab.com/privkey.pem;

        return 301 https://uberfix.alazab.com$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name uberfix.alazab.com;

        root /usr/share/nginx/html;
        index index.html;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/uberfix.alazab.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/uberfix.alazab.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com https://api.mapbox.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; img-src 'self' data: blob: https: http:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://maps.googleapis.com https://api.mapbox.com https://*.tiles.mapbox.com https://events.mapbox.com https://www.google-analytics.com https://www.googletagmanager.com https://api.emailjs.com; frame-src 'self' https://accounts.google.com https://www.facebook.com; object-src 'none'; base-uri 'self';" always;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"healthy","domain":"uberfix.alazab.com","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # Static assets - immutable cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # Service worker - no cache
        location /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files $uri =404;
        }

        # Manifest
        location /manifest.json {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # Robots.txt
        location /robots.txt {
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # Sitemap
        location /sitemap.xml {
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # Block sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.(env|git|bak|old|swp|tmp)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # SPA fallback
        location / {
            limit_req zone=general burst=50 nodelay;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
