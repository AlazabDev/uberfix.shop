    <!-- تحميل CSS الأساسي مع لون رمادي فاتح -->
    <style>
        /* CSS لتحسين العرض الأولي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5; /* رمادي فاتح */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Arabic', sans-serif;
            color: #333333;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* أنيميشن للتحميل */
        .loading-skeleton {
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                opacity: 1; 
            }
            50% { 
                opacity: 0.7; 
            }
        }
        
        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
        }
        
        /* تحسينات للطباعة */
        @media print {
            body {
                background-color: white;
                color: black;
            }
        }
        
        /* تحسينات للأجهزة التي تستخدم الوضع المظلم */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
                color: #e0e0e0;
            }
        }
        
        /* تحسينات للأجهزة التي تحتوي على notch */
        @supports (padding: max(0px)) {
            body {
                padding-left: min(0vmin, env(safe-area-inset-left));
                padding-right: min(0vmin, env(safe-area-inset-right));
                padding-top: min(0vmin, env(safe-area-inset-top));
                padding-bottom: min(0vmin, env(safe-area-inset-bottom));
            }
        }
    </style>

    <div id="root">
        <!-- Skeleton Loader - محسّن مع الخلفية الرمادية -->
        <div style="
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            position: relative;
            overflow: hidden;
        ">
            <!-- نمط خلفية خفيف -->
            <div style="
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-image: 
                    radial-gradient(circle at 25% 25%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 75% 75%, rgba(255, 119, 198, 0.1) 0%, transparent 50%);
                z-index: 1;
            "></div>
            
            <!-- محتوى التحميل -->
            <div style="
                text-align: center; 
                color: #333333;
                z-index: 2;
                padding: 20px;
                max-width: 90%;
                width: 400px;
            ">
                <!-- الصورة المتحركة -->
                <div style="
                    width: 120px; 
                    height: 120px; 
                    margin: 0 auto 25px; 
                    border-radius: 50%; 
                    background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
                    display: flex; 
                    align-items: center; 
                    justify-content: center;
                    border: 3px solid #ffffff;
                    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                    overflow: hidden;
                    padding: 10px;
                ">
                    <img 
                        src="/uf-icon.gif" 
                        alt="UberFix Logo" 
                        style="
                            width: 100%;
                            height: 100%;
                            object-fit: contain;
                            border-radius: 50%;
                        "
                        onerror="this.style.display='none'; this.parentElement.innerHTML='🔧'"
                    />
                </div>
                
                <!-- نص التحميل -->
                <h1 style="
                    margin: 0 0 10px; 
                    font-size: 28px; 
                    font-weight: 700;
                    color: #2d3748;
                    letter-spacing: -0.5px;
                ">
                    UberFix
                </h1>
                
                <p style="
                    opacity: 0.8; 
                    margin: 0 0 25px; 
                    font-size: 16px;
                    color: #4a5568;
                ">
                    جاري تحميل النظام...
                </p>
                
                <!-- شريط التقدم -->
                <div style="
                    width: 100%;
                    height: 6px;
                    background-color: #e2e8f0;
                    border-radius: 3px;
                    overflow: hidden;
                    margin-bottom: 20px;
                ">
                    <div style="
                        width: 60%;
                        height: 100%;
                        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
                        border-radius: 3px;
                        animation: loading 2s ease-in-out infinite;
                    "></div>
                </div>
                
                <!-- تلميح -->
                <p style="
                    font-size: 12px;
                    color: #718096;
                    margin: 0;
                    opacity: 0.7;
                ">
                    نظام إدارة الصيانة المحمول المتكامل
                </p>
            </div>
        </div>
    </div>
